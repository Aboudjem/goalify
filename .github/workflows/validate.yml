name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # (a) FRONTMATTER CHECK
      - name: Frontmatter check (SKILL.md)
        shell: bash
        run: |
          python3 - <<'PY'
          import re, sys

          path = "skills/goalify/SKILL.md"
          try:
              with open(path, "r", encoding="utf-8") as f:
                  text = f.read()
          except FileNotFoundError:
              print(f"FAIL: {path} not found")
              sys.exit(1)

          m = re.match(r"^---\s*\n(.*?)\n---\s*(?:\n|$)", text, re.DOTALL)
          if not m:
              print(f"FAIL: no YAML frontmatter block found in {path}")
              sys.exit(1)
          block = m.group(1)

          # Minimal YAML parse for top-level 'name' and 'description'.
          # Supports plain scalars and folded/literal block scalars (>- , | , etc.).
          def parse_frontmatter(block):
              data = {}
              lines = block.split("\n")
              i = 0
              key_re = re.compile(r"^([A-Za-z0-9_-]+):\s*(.*)$")
              while i < len(lines):
                  line = lines[i]
                  if not line.strip() or line.lstrip().startswith("#"):
                      i += 1
                      continue
                  if line[:1] in (" ", "\t"):
                      i += 1
                      continue
                  km = key_re.match(line)
                  if not km:
                      i += 1
                      continue
                  key, rest = km.group(1), km.group(2).strip()
                  if rest.startswith(("|", ">")):
                      collected = []
                      i += 1
                      while i < len(lines):
                          nxt = lines[i]
                          if nxt.strip() == "":
                              collected.append("")
                              i += 1
                              continue
                          if nxt[:1] in (" ", "\t"):
                              collected.append(nxt.strip())
                              i += 1
                          else:
                              break
                      data[key] = " ".join(c for c in collected if c != "").strip()
                      continue
                  val = rest
                  if len(val) >= 2 and val[0] == val[-1] and val[0] in ("'", '"'):
                      val = val[1:-1]
                  data[key] = val
                  i += 1
              return data

          fm = parse_frontmatter(block)
          ok = True

          name = fm.get("name", "")
          if not re.fullmatch(r"[a-z0-9-]+", name or ""):
              print(f"FAIL: 'name' must match ^[a-z0-9-]+$ (got: {name!r})")
              ok = False
          elif len(name) > 64:
              print(f"FAIL: 'name' must be <= 64 chars (got {len(name)})")
              ok = False
          else:
              print(f"PASS: 'name' is valid ({name!r})")

          desc = fm.get("description", "")
          if not desc or not desc.strip():
              print("FAIL: 'description' must be non-empty")
              ok = False
          elif len(desc) > 1024:
              print(f"FAIL: 'description' must be <= 1024 chars (got {len(desc)})")
              ok = False
          else:
              print(f"PASS: 'description' is valid ({len(desc)} chars)")

          if not ok:
              sys.exit(1)
          print("PASS: frontmatter check passed")
          PY

      # (b) SKILL EVAL — the CONFIRMED research edits must stay present (RED->GREEN regression guard)
      - name: Skill eval (check_skill.py)
        shell: bash
        run: python3 evals/check_skill.py skills/goalify/SKILL.md

      # (c) NO-SECRETS CHECK (all tracked files)
      - name: No secrets
        shell: bash
        run: |
          python3 - <<'PY'
          import re, subprocess, sys

          files = subprocess.run(
              ["git", "ls-files"],
              capture_output=True, text=True, check=True,
          ).stdout.splitlines()

          akia_re = re.compile(r"AKIA[0-9A-Z]{16}")
          pk_re = re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----")

          findings = []
          for path in files:
              if path.startswith(".git/") or path == ".git":
                  continue
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as f:
                      data = f.read()
              except (IsADirectoryError, FileNotFoundError, OSError):
                  continue
              for ln, line in enumerate(data.splitlines(), 1):
                  if akia_re.search(line):
                      findings.append((path, ln, "AWS access key id (AKIA...)"))
                  if pk_re.search(line):
                      findings.append((path, ln, "private key header"))

          if findings:
              print("FAIL: potential secret(s) found:")
              for path, ln, kind in findings:
                  print(f"  {path}:{ln}: {kind}")
              sys.exit(1)
          print("PASS: no access keys or private keys found in tracked files")
          PY

      # (d) JSON VALIDITY
      - name: JSON validity
        shell: bash
        run: |
          python3 - <<'PY'
          import json, sys

          targets = [
              ".claude-plugin/marketplace.json",
              ".claude-plugin/plugin.json",
          ]
          ok = True
          for path in targets:
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      json.load(f)
                  print(f"PASS: valid JSON -> {path}")
              except FileNotFoundError:
                  print(f"FAIL: {path} not found")
                  ok = False
              except json.JSONDecodeError as e:
                  print(f"FAIL: invalid JSON in {path}: {e}")
                  ok = False
          if not ok:
              sys.exit(1)
          print("PASS: JSON validity check passed")
          PY

      # (e) SVG SAFETY GATE — heroes must stay GitHub-safe (no <script>, no external refs)
      - name: SVG safety (no <script>, no external refs)
        shell: bash
        run: |
          set -o pipefail
          shopt -s nullglob
          fail=0
          for svg in assets/*.svg; do
            if grep -q '<script' "$svg"; then
              echo "FAIL: <script> found in $svg"; fail=1
            fi
            if grep -Eq 'href="https?:|xlink:href="https?:|<image|@import|url\(https?:' "$svg"; then
              echo "FAIL: external reference found in $svg"; fail=1
            fi
            python3 -c "import xml.dom.minidom,sys; xml.dom.minidom.parse('$svg')" \
              && echo "PASS: $svg is well-formed, script-free, self-contained" \
              || { echo "FAIL: $svg is not well-formed XML"; fail=1; }
          done
          exit $fail

      # (f) MARKDOWN LINK CHECK (relative links only; skip http(s))
      - name: Markdown relative-link check
        shell: bash
        run: |
          python3 - <<'PY'
          import os, re, subprocess, sys
          from urllib.parse import unquote

          md_files = subprocess.run(
              ["git", "ls-files", "*.md"],
              capture_output=True, text=True, check=True,
          ).stdout.splitlines()

          link_re = re.compile(r"\[[^\]]*\]\(([^)]+)\)")
          fence_re = re.compile(r"^\s*(`{3,}|~{3,})")
          inline_code_re = re.compile(r"`[^`]*`")

          broken = []
          checked = 0
          for md in md_files:
              try:
                  with open(md, "r", encoding="utf-8", errors="ignore") as f:
                      lines = f.readlines()
              except (IsADirectoryError, FileNotFoundError, OSError):
                  continue

              in_fence = False
              base_dir = os.path.dirname(md)
              for line in lines:
                  if fence_re.match(line):
                      in_fence = not in_fence
                      continue
                  if in_fence:
                      continue
                  line = inline_code_re.sub("", line)
                  for raw in link_re.findall(line):
                      target = raw.strip()
                      if " " in target:
                          target = target.split(" ", 1)[0].strip()
                      target = target.strip("<>")
                      if not target:
                          continue
                      low = target.lower()
                      if low.startswith(("http://", "https://", "mailto:", "tel:",
                                         "#", "ftp://", "data:")):
                          continue
                      path_part = target.split("#", 1)[0].split("?", 1)[0]
                      path_part = unquote(path_part)
                      if not path_part:
                          continue
                      if path_part.startswith("/"):
                          resolved = path_part.lstrip("/")
                      else:
                          resolved = os.path.normpath(os.path.join(base_dir, path_part))
                      checked += 1
                      if not os.path.exists(resolved):
                          broken.append((md, target, resolved))

          if broken:
              print("FAIL: broken relative markdown link(s):")
              for md, target, resolved in broken:
                  print(f"  {md}: '{target}' -> '{resolved}' (missing)")
              sys.exit(1)
          print(f"PASS: all {checked} relative markdown link(s) resolve")
          PY
