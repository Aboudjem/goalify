<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-labelledby="wtitle wdesc"
  font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
  <title id="wtitle">How goalify works</title>
  <desc id="wdesc">Three steps in a terminal. 1 Prepare: goalify inspects the repo and locks the real decisions. 2 Hand off: it writes a self-contained, self-deleting /goal file. 3 Run: you /clear and a fresh session executes and verifies it to GOAL COMPLETE.</desc>
  <defs>
    <linearGradient id="w-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10151D"/><stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="w-flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D97757"/><stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <filter id="w-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .w-ttl{font-size:13px;fill:#7E8B9D;letter-spacing:2.4px;font-weight:600}
      .w-eb{font-size:12px;fill:#8A97A9;letter-spacing:2px;font-weight:700}
      .w-head{font-size:19px;fill:#EDF1F6;font-weight:700;letter-spacing:-.2px}
      .w-body{font-size:13.5px;fill:#7E8B9D}
      .w-snip{font-size:14px;fill:#C4CEDA}
      .w-dim{font-size:12.5px;fill:#5E6E81}
      #w-dash{animation:w-flow 3.4s linear infinite}
      @keyframes w-flow{to{stroke-dashoffset:-260}}
      .w-chip{opacity:1}
      #w-c1{animation:w-pulse 3.6s ease-in-out infinite}
      #w-c2{animation:w-pulse 3.6s ease-in-out infinite 1.2s}
      #w-c3{animation:w-pulse 3.6s ease-in-out infinite 2.4s}
      @keyframes w-pulse{0%,100%{opacity:.78}50%{opacity:1}}
    </style>
  </defs>

  <rect x="56" y="18" width="1088" height="244" rx="16" fill="url(#w-card)" stroke="#202A3A" stroke-width="1.5"/>
  <circle cx="88" cy="42" r="5.5" fill="#FF5F57"/>
  <circle cx="110" cy="42" r="5.5" fill="#FEBC2E"/>
  <circle cx="132" cy="42" r="5.5" fill="#28C840"/>
  <text x="600" y="46" text-anchor="middle" class="w-ttl">HOW IT WORKS</text>
  <line x1="56" y1="64" x2="1144" y2="64" stroke="#1A2230" stroke-width="1.5"/>

  <!-- flow connectors behind chips -->
  <line x1="352" y1="120" x2="478" y2="120" stroke="#1E2740" stroke-width="2"/>
  <line x1="722" y1="120" x2="848" y2="120" stroke="#1E2740" stroke-width="2"/>
  <line id="w-dash" x1="352" y1="120" x2="848" y2="120" stroke="url(#w-flow)" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="2 16" filter="url(#w-glow)"/>
  <path d="M474 115 l6 5 l-6 5" fill="none" stroke="#3C4860" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M844 115 l6 5 l-6 5" fill="none" stroke="#3C4860" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- STEP 1 -->
  <g id="w-c1" class="w-chip">
    <rect x="112" y="86" width="236" height="68" rx="11" fill="#131A24" stroke="#222C3D" stroke-width="1.5"/>
    <path d="M134 104 l9 7 l-9 7" fill="none" stroke="#D97757" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="156" y="116" class="w-snip">goalify this:</text>
    <text x="134" y="139" class="w-dim">inspecting the repo…</text>
  </g>
  <text x="230" y="192" text-anchor="middle" class="w-eb">STEP 1 · PREPARE</text>
  <text x="230" y="216" text-anchor="middle" class="w-head">Research &amp; decide</text>
  <text x="230" y="240" text-anchor="middle" class="w-body">Inspects the repo, locks the real calls.</text>

  <!-- STEP 2 -->
  <g id="w-c2" class="w-chip">
    <rect x="482" y="86" width="236" height="68" rx="11" fill="#131A24" stroke="#222C3D" stroke-width="1.5"/>
    <path d="M502 110 l4.5 5 l10 -13" fill="none" stroke="#3FB950" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="526" y="116" class="w-snip">api-migration.md</text>
    <text x="504" y="139" class="w-dim">.goal/ · self-deleting</text>
  </g>
  <text x="600" y="192" text-anchor="middle" class="w-eb">STEP 2 · HAND OFF</text>
  <text x="600" y="216" text-anchor="middle" class="w-head">Write the /goal file</text>
  <text x="600" y="240" text-anchor="middle" class="w-body">A self-contained, self-deleting run file.</text>

  <!-- STEP 3 -->
  <g id="w-c3" class="w-chip">
    <rect x="852" y="86" width="236" height="68" rx="11" fill="#131A24" stroke="#222C3D" stroke-width="1.5"/>
    <path d="M872 104 l9 7 l-9 7" fill="none" stroke="#8A97A9" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="894" y="116" class="w-dim">/goal …</text>
    <path d="M872 132 l4.5 5 l10 -13" fill="none" stroke="#4ADE80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#w-glow)"/>
    <text x="896" y="142" class="w-snip" fill="#7DEBA3" font-weight="700" letter-spacing="1">GOAL COMPLETE</text>
  </g>
  <text x="970" y="192" text-anchor="middle" class="w-eb">STEP 3 · RUN</text>
  <text x="970" y="216" text-anchor="middle" class="w-head">Run in a fresh session</text>
  <text x="970" y="240" text-anchor="middle" class="w-body">/clear, then it executes and verifies.</text>
</svg>
